<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CINEMATIC</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #E50914;
    --dark: #0d0d0d;
    --white: #fff;
    --grey: #b3b3b3;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--dark);
    color: var(--white);
    font-family: 'Montserrat', sans-serif;
    overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 48px;
    background: linear-gradient(to bottom, rgba(0,0,0,.85) 0%, transparent 100%);
    animation: fadeDown .9s ease forwards;
  }

  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 4px;
    color: var(--red);
    text-shadow: 0 0 30px rgba(229,9,20,.5);
  }

  .nav-links {
    display: flex; gap: 28px;
    list-style: none;
  }
  .nav-links a {
    color: var(--grey);
    text-decoration: none;
    font-size: .8rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    transition: color .2s;
  }
  .nav-links a:hover { color: var(--white); }

  /* ── HERO ── */
  .hero {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  /* Ken Burns */
  .hero-bg {
    position: absolute;
    inset: -5%;
    background-image: url('https://res.cloudinary.com/ddrpctqpl/image/upload/v1778997922/file_000000002a1871f5a6092525c2f12a0e_o78b4m.png');
    background-size: cover;
    background-position: center top;
    animation: kenBurns 20s ease-in-out infinite alternate;
    filter: brightness(.75) saturate(1.1);
  }

  @keyframes kenBurns {
    0%   { transform: scale(1)    translate(0,0); }
    100% { transform: scale(1.08) translate(-2%, 1%); }
  }

  /* Vignette + gradient */
  .hero-vignette {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,.85) 100%),
      linear-gradient(to top,  rgba(0,0,0,.98) 0%, rgba(0,0,0,.3) 40%, transparent 70%),
      linear-gradient(to right, rgba(0,0,0,.7) 0%, transparent 60%);
  }

  /* Content */
  .hero-content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    height: 100%;
    padding: 0 48px 90px;
    animation: fadeUp 1.1s .3s ease both;
  }

  .content-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: .7rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 14px;
  }
  .content-badge::before {
    content: '';
    display: block;
    width: 24px; height: 2px;
    background: var(--red);
  }

  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(4rem, 10vw, 9rem);
    line-height: .95;
    letter-spacing: 4px;
    text-shadow: 0 4px 40px rgba(0,0,0,.8);
    max-width: 700px;
    margin-bottom: 20px;
  }

  .hero-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    font-size: .8rem;
    color: var(--grey);
    font-weight: 600;
    letter-spacing: 1px;
  }
  .hero-meta .match { color: #46d369; }
  .hero-meta .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--grey);
  }

  .hero-desc {
    max-width: 480px;
    font-size: .95rem;
    line-height: 1.7;
    color: #d4d4d4;
    font-weight: 300;
    margin-bottom: 34px;
    text-shadow: 0 1px 8px rgba(0,0,0,.9);
  }

  .hero-buttons {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    align-items: center;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 30px;
    border-radius: 4px;
    font-family: 'Montserrat', sans-serif;
    font-size: .9rem;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    border: none;
    transition: transform .15s, filter .15s, background .15s;
    text-transform: uppercase;
  }
  .btn:hover { transform: scale(1.04); filter: brightness(1.15); }

  .btn-play {
    background: var(--white);
    color: #000;
  }
  .btn-info {
    background: rgba(109,109,110,.7);
    color: var(--white);
    border: 1px solid rgba(255,255,255,.15);
    backdrop-filter: blur(8px);
  }

  .btn svg { flex-shrink: 0; }

  /* Sound toggle */
  .sound-btn {
    position: fixed;
    bottom: 100px; right: 48px;
    z-index: 50;
    background: rgba(0,0,0,.6);
    border: 2px solid rgba(255,255,255,.4);
    color: var(--white);
    width: 46px; height: 46px;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color .2s, background .2s;
    backdrop-filter: blur(10px);
    animation: fadeUp 1.4s .6s ease both;
  }
  .sound-btn:hover {
    border-color: var(--white);
    background: rgba(0,0,0,.85);
  }

  /* Bottom gradient bar */
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(to right, var(--red), #ff6b6b, var(--red));
    z-index: 200;
    animation: slideIn 2s 1.5s ease both;
    transform-origin: left;
  }

  /* Scan-line overlay for cinematic feel */
  .scanlines {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 5;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,.03) 2px,
      rgba(0,0,0,.03) 4px
    );
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeDown {
    from { opacity:0; transform: translateY(-20px); }
    to   { opacity:1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(30px); }
    to   { opacity:1; transform: translateY(0); }
  }
  @keyframes slideIn {
    from { transform: scaleX(0); }
    to   { transform: scaleX(1); }
  }

  /* ── RESPONSIVE ── */
  @media(max-width: 768px) {
    nav { padding: 16px 24px; }
    .nav-links { display: none; }
    .hero-content { padding: 0 24px 80px; }
    .sound-btn { right: 24px; bottom: 80px; }
  }
</style>
</head>
<body>

<!-- Cinematic scan-lines -->
<div class="scanlines"></div>

<!-- Nav -->
<nav>
  <div class="nav-logo">STREAM</div>
  <ul class="nav-links">
    <li><a href="#">Home</a></li>
    <li><a href="#">Series</a></li>
    <li><a href="#">Films</a></li>
    <li><a href="#">New &amp; Popular</a></li>
    <li><a href="#">My List</a></li>
  </ul>
</nav>

<!-- Hero -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-vignette"></div>

  <div class="hero-content">
    <div class="content-badge">Featured Film</div>

    <h1 class="hero-title">Lewis &amp; Sarafina</h1>

    <div class="hero-meta">
      <span class="match">97% Match</span>
      <span class="dot"></span>
      <span>2016</span>
      <span class="dot"></span>
      <span>4K Ultra HD</span>
      <span class="dot"></span>
      <span>Dolby Atmos</span>
    </div>

    <div class="hero-buttons">
      <!-- Play -->
      <button class="btn btn-play" onclick="togglePlay()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
        Play
      </button>

      <!-- More Info -->
      <button class="btn btn-info">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        More Info
      </button>
    </div>
  </div>
</section>

<!-- Sound toggle -->
<button class="sound-btn" id="soundBtn" onclick="toggleSound()" title="Toggle sound">
  <svg id="iconSound" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/>
    <path d="M15.54,8.46a5,5,0,0,1,0,7.07"/>
    <path d="M19.07,4.93a10,10,0,0,1,0,14.14"/>
  </svg>
  <svg id="iconMute" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
    <polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/>
    <line x1="23" y1="9" x2="17" y2="15"/>
    <line x1="17" y1="9" x2="23" y2="15"/>
  </svg>
</button>

<!-- Bottom accent bar -->
<div class="bottom-bar"></div>

<!-- Audio -->
<audio id="bgAudio" loop>
  <source src="https://res.cloudinary.com/ddrpctqpl/video/upload/v1778997836/Pink_White_-_Frank_Ocean_bfihoi.mp3" type="audio/mpeg"/>
</audio>

<script>
  const audio = document.getElementById('bgAudio');
  const iconSound = document.getElementById('iconSound');
  const iconMute  = document.getElementById('iconMute');
  let playing = false;
  let muted   = false;

  // Try auto-play on load
  window.addEventListener('load', () => {
    audio.volume = 0.55;
    audio.play().then(() => {
      playing = true;
      muted = false;
      showSoundIcon();
    }).catch(() => {
      // Blocked by browser — user must interact first
      playing = false;
      showMuteIcon();
    });
  });

  function toggleSound() {
    if (!playing) {
      audio.play();
      playing = true;
      muted = false;
      showSoundIcon();
    } else {
      muted = !muted;
      audio.muted = muted;
      muted ? showMuteIcon() : showSoundIcon();
    }
  }

  function togglePlay() {
    if (!playing || audio.paused) {
      audio.play();
      playing = true;
      muted = false;
      audio.muted = false;
      showSoundIcon();
    } else {
      audio.pause();
      playing = false;
      showMuteIcon();
    }
  }

  function showSoundIcon() {
    iconSound.style.display = '';
    iconMute.style.display  = 'none';
  }
  function showMuteIcon() {
    iconSound.style.display = 'none';
    iconMute.style.display  = '';
  }
</script>
</body>
</html>
